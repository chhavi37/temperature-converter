<!DOCTYPE html>
<head>
    <title>Temperature converter</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(202, 195, 195);
        }
        h1{
            color: hwb(240 39% 5%);
        }
        form{
            background-color: rgb(237, 231, 231);
            text-align: center;
            max-width: 350px;
            margin: auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.296);
        }
        #textbox{
            width: 50%;
            text-align: center;
            font-size: 2em;
            border: 2px solid rgba(0, 0, 0, 0.375);
            border-radius: 4px;
            margin-bottom: 15px;

        }
        label{
            font-size: 1.5em ;
            font-weight: bold;

        }
        button{
            margin-top: 15px;
            background-color: rgb(241, 53, 53);
            font-size: 1.5em;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            color: white;
            cursor: pointer;

        }
        button:hover{
            background-color: rgb(220, 114, 135);
        }
        #result{
            font-size: 1.75em;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <form>
        <h1>Temperature Converter</h1>
        <input type="number" id="textbox" value="0">
        <br>
        <input type="radio" id="toFahrenheit" name="unit">
        <label for="toFahrenheit">Celsius➡️Fahrenheit</label>
        <br>
        <input type="radio" id="toCelsius" name="unit">
        <label for="toCelsius">Fahrenheit➡️Celsius</label>
        <br>
        <button type="button" onclick="convert()"  >submit</button>      
        <p id="result">Select a unit</p>
    </form>
    <script>
        const textbox=document.getElementById("textbox");
        const toFahrenheit=document.getElementById("toFahrenheit");
        const toCelsius=document.getElementById("toCelsius");
        const result = document.getElementById("result");
        let temp;

        function convert(){
            if(toFahrenheit.checked){
                temp= Number(textbox.value);
                temp = temp * 9/5 + 32;
                result.textContent= temp.toFixed(1) + "°F" ;
            }else if(toCelsius.checked){
                temp= Number(textbox.value);
                temp = (temp - 32) * (5/9);
                result.textContent= temp.toFixed(1) + "°C" ;

            }else{
                result.textContent="Select a unit";
            }
        }
    </script>
</body>
</html>
